plugins {
    id 'java'
    id 'war'
}

group 'com.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

ext {
    junitVersion = '5.13.2'
}

sourceCompatibility = '22'
targetCompatibility = '22'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

dependencies {
    compileOnly('jakarta.servlet:jakarta.servlet-api:6.1.0')

    testImplementation("org.junit.jupiter:junit-jupiter-api:${junitVersion}")
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:${junitVersion}")

    // Spring Web MVC
    implementation 'org.springframework:spring-webmvc:6.1.5'

    // Thymeleaf tích hợp Spring 6
    implementation 'org.thymeleaf:thymeleaf-spring6:3.1.2.RELEASE'

    // Jackson (Bắt buộc phải có để parse Object thành chuỗi JSON ở Bài 5)
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'

    // Servlet API (Cung cấp các class về MultipartConfig cho Tomcat)
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'
}

test {
    useJUnitPlatform()
}