<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Món Ăn Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9; /* Màu nền xám nhạt cho dịu mắt */
        }
        .form-card {
            max-width: 600px;
            margin: 50px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* Hiệu ứng bóng đổ 3D */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 class="text-center mb-4 text-primary fw-bold">🍳 Đăng Ký Món Ăn</h2>

        <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
            <strong>Lỗi!</strong> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/food/add}" method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label fw-bold">Tên món ăn:</label>
                <input type="text" name="name" class="form-control form-control-lg" placeholder="Ví dụ: Gà rán giòn rụm..." required />
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Danh mục:</label>
                <select name="category" class="form-select form-select-lg">
                    <option value="Khai vị">Khai vị</option>
                    <option value="Món chính" selected>Món chính</option>
                    <option value="Đồ uống">Đồ uống</option>
                    <option value="Tráng miệng">Tráng miệng</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Giá tiền (VNĐ):</label>
                <div class="input-group">
                    <input type="number" name="price" class="form-control form-control-lg" value="0" min="0" required />
                    <span class="input-group-text fw-bold">VNĐ</span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Ảnh món ăn (*.jpg, *.png):</label>
                <input type="file" name="image" class="form-control form-control-lg" accept="image/png, image/jpeg" />
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg fw-bold">💾 Lưu Món Ăn Ngay</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
